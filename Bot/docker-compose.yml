version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: transcriber_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transcriber
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: transcriber_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: transcriber_api
    restart: always
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - shared_storage:/app/storage
      - .env:/app/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/transcriber
      - REDIS_URL=redis://redis:6379/0

  bot:
    build: .
    container_name: transcriber_bot
    restart: always
    command: python app/bot/main.py
    volumes:
      - shared_storage:/app/storage
      - .env:/app/.env
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/transcriber
      - REDIS_URL=redis://redis:6379/0

  worker:
    build: .
    container_name: transcriber_worker
    restart: always
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1
    volumes:
      - shared_storage:/app/storage
      - .env:/app/.env
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/transcriber
      - REDIS_URL=redis://redis:6379/0

volumes:
  postgres_data:
  shared_storage:
